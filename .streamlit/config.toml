[theme]
base = "light"
primaryColor = "#1877F2"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F5"
textColor = "#1C1E21"
font = "sans serif"

[server]
# headless = true is required for Streamlit Cloud (no browser to open).
# Locally Streamlit will still open a browser tab automatically.
headless = true

[browser]
gatherUsageStats = false
